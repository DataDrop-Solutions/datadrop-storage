name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Main API Worker (Account A) ──────────────────────────────────────
  deploy-api:
    name: Deploy datadrop-api (Account A)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy datadrop-api worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── Job 2: Upload Worker (Account A) ────────────────────────────────────────
  deploy-upload:
    name: Deploy datadrop-upload (Account A)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy datadrop-upload worker
        run: wrangler deploy --config workers/upload/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── Job 3: R2 Hot Worker (Account B) ────────────────────────────────────────
  deploy-r2-hot:
    name: Deploy datadrop-r2-hot (Account B)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy datadrop-r2-hot worker
        run: wrangler deploy --config workers/r2-hot/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_ACCOUNT_B_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_B_ID }}

  # ── Job 4: Frontend — Cloudflare Pages ──────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: app

      - name: Build frontend
        run: npm run build
        working-directory: app

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name datadrop-app
          workingDirectory: app
