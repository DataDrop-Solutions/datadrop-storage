name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  WRANGLER_SEND_METRICS: false

jobs:
  # ── Job 1: Main API Worker ───────────────────────────────────────────────────
  deploy-api:
    name: Deploy datadrop-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g wrangler@4.107.0
      - name: Deploy datadrop-api worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── Job 2: Upload Worker ─────────────────────────────────────────────────────
  deploy-upload:
    name: Deploy datadrop-upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g wrangler@4.107.0
      - name: Deploy datadrop-upload worker
        run: wrangler deploy --config workers/upload/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── Job 3: Frontend — Cloudflare Pages ──────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: app
      - name: Build frontend
        run: npm run build
        working-directory: app
      - run: npm install -g wrangler@4.107.0
      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name datadrop-app
        working-directory: app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
