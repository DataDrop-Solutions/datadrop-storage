name: Deploy to Cloudflare

on:
  push:
    branches: [main]

# Required GitHub Secrets:
#   CF_API_TOKEN       — Account A Cloudflare API token (Workers + Pages deploy permissions)
#   CF_ACCOUNT_ID      — Account A ID: 361136c11c967d9120a77c756b204167
#   CF_ACCOUNT_B_TOKEN — Account B Cloudflare API token (Workers deploy permission)
#   CF_ACCOUNT_B_ID    — Account B ID: 5b761b45997f1aa8bdcf455bbdf34324

jobs:
  # ── Job 1: Main API Worker (Account A) ──────────────────────────────────────
  # Deploys datadrop-api — the monolithic worker that handles all routes:
  # api.datadrop.co.in, files.datadrop.co.in, stream.datadrop.co.in, admin.datadrop.co.in
  deploy-api:
    name: Deploy datadrop-api (Account A)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy datadrop-api worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── Job 2: Upload Worker (Account A) ────────────────────────────────────────
  # datadrop-upload is a separate worker that handles chunked/multipart uploads
  # to B2 (Backblaze). Route: api.datadrop.co.in/upload/*
  deploy-upload:
    name: Deploy datadrop-upload (Account A)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy datadrop-upload worker
        run: npx wrangler deploy --config workers/upload/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── Job 3: R2 Hot Worker (Account B) ────────────────────────────────────────
  # datadrop-r2-hot lives on a SEPARATE Cloudflare account (Account B).
  # It serves hot R2 object storage with INTERNAL_SECRET-authenticated access.
  deploy-r2-hot:
    name: Deploy datadrop-r2-hot (Account B)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy datadrop-r2-hot worker
        run: npx wrangler deploy --config workers/r2-hot/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_ACCOUNT_B_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_B_ID }}

  # ── Job 4: Frontend — Cloudflare Pages ──────────────────────────────────────
  # React + Vite app deployed to Cloudflare Pages project: datadrop-app
  # Frontend source must live in the app/ subdirectory of this repo.
  deploy-frontend:
    name: Build & Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: app

      - name: Build frontend
        run: npm run build
        working-directory: app

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name datadrop-app
        working-directory: app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
