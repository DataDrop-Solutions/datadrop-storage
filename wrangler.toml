# ============================================================
# DataDrop — Account A Master wrangler config
# ============================================================

name = "datadrop-api"
main = "workers/api-router/index.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
account_id = "361136c11c967d9120a77c756b204167"

[[d1_databases]]
binding = "DB"
database_name = "datadrop-db"
database_id = "c7147369-e5ae-4d6c-aebc-4c2f91932ca3"
[d1_databases.experimental_read_replication]
mode = "auto"

[[kv_namespaces]]
binding = "KV"
id = "367fe17c62f04183981ea5d5b89f702e"

# Account A owns datadrop-backup
[[r2_buckets]]
binding = "R2_BACKUP"
bucket_name = "datadrop-backup"

[[queues.producers]]
binding = "QUEUE"
queue = "datadrop-queue"

[[queues.consumers]]
queue = "datadrop-queue"
max_batch_size = 20
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "datadrop-dlq"

[triggers]
crons = [
  "0 18 1 * *",   # Billing: 1st of month 00:05 IST
  "0 18 28-31 * *", # Bill preview: last day of month (checked in handler)
  "0 20 * * *",   # Backup:  daily 02:00 IST
  "0 2 * * *",    # Trial:   daily 07:30 IST
  "0 * * * *",    # Reconcile: every hour
]

[vars]
B2_COLD_BUCKET  = "datadrop-cold"
B2_VAULT_BUCKET = "datadrop-vault"
B2_MAIN_BUCKET  = "datadrop-cold"
CF_ACCOUNT_A_ID = "361136c11c967d9120a77c756b204167"
VAST_TAG_URL    = ""

[[routes]]
pattern = "api.datadrop.co.in/*"
zone_name = "datadrop.co.in"

[[routes]]
pattern = "files.datadrop.co.in/*"
zone_name = "datadrop.co.in"

[[routes]]
pattern = "stream.datadrop.co.in/*"
zone_name = "datadrop.co.in"

[[routes]]
pattern = "admin.datadrop.co.in/*"
zone_name = "datadrop.co.in"

# Secrets — set via deploy.sh or manually:
# wrangler secret put <NAME>
#
# CLERK_SECRET_KEY
# CLERK_WEBHOOK_SECRET
# B2_COLD_KEY_ID
# B2_COLD_APP_KEY
# B2_COLD_BUCKET_ID
# B2_VAULT_KEY_ID      ← legacy: only serves/deletes files uploaded before the
# B2_VAULT_APP_KEY       single-bucket consolidation (migration_v5); all new
# B2_VAULT_BUCKET_ID     uploads (vault included) go to B2_COLD/B2_MAIN
# RESEND_API_KEY
# RAZORPAY_KEY_ID
# RAZORPAY_KEY_SECRET
# MSG91_AUTH_KEY
# STREAM_SECRET        (openssl rand -hex 32)
# ADMIN_SECRET         (openssl rand -hex 32)
# ADMIN_PASSWORD       (your chosen password)
# CF_API_TOKEN
# RAZORPAY_MANDATE_PLAN_ID  ← Razorpay recurring plan ID for UPI autopay mandates
#
# B2_MAIN_KEY_ID / B2_MAIN_APP_KEY / B2_MAIN_BUCKET_ID
#   Read directly by download/index.js, stream/index.js, and migration/index.js
#   for files marked bucket = 'b2_main' in D1. Note: files.js's upload/read path
#   goes through b2CredsForBucket(), which has no 'b2_main' case and falls back
#   to B2_COLD_* credentials for anything that isn't 'b2_vault' — so uploads
#   authenticate with B2_COLD_*, while download/stream/delete for the same file
#   authenticate with B2_MAIN_*. Keep both sets of credentials valid for the
#   same underlying bucket until that's unified.
